<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta "viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | VATMaster OSS Freelancer Tool</title>
    <meta name="description" content="Get support for the VATMaster OSS calculator or ask questions about EU VAT compliance for digital services.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white">

    <main class="pt-24 container mx-auto px-6 py-16">
        
        <div class="text-center max-w-3xl mx-auto mb-16">
            <h1 class="text-4xl font-extrabold text-secondary mb-4">Get in <span class="text-primary">Touch</span></h1>
            <p class="text-xl text-slate-600">Have questions about our calculator or OSS compliance? Our small team is here to help.</p>
        </div>

        <div class="grid md:grid-cols-3 gap-12 mb-16">
            <div class="bg-slate-50 p-8 rounded-2xl text-center border border-slate-100">
                <div class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center mb-6 mx-auto">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <h3 class="text-xl font-bold mb-2">Email Us</h3>
                <p class="text-slate-600">We respond within 24 hours.</p>
                <a href="mailto:support@vatmasteross.io" class="text-primary font-semibold mt-3 block">support@vatmasteross.io</a>
            </div>
            
            <div class="bg-slate-50 p-8 rounded-2xl text-center border border-slate-100">
                <div class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center mb-6 mx-auto">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                </div>
                <h3 class="text-xl font-bold mb-2">Call Us</h3>
                <p class="text-slate-600">Mon-Fri, 9am - 5pm CET.</p>
                <p class="text-primary font-semibold mt-3">+1 (555) 123-VAT</p>
            </div>

            <div class="bg-slate-50 p-8 rounded-2xl text-center border border-slate-100">
                <div class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center mb-6 mx-auto">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <h3 class="text-xl font-bold mb-2">Visit Us</h3>
                <p class="text-slate-600">Headquarters (By Appointment)</p>
                <p class="text-primary font-semibold mt-3">Berlin, Germany</p>
            </div>
        </div>

        <section id="map" class="rounded-3xl overflow-hidden shadow-xl border border-slate-200">
            <h2 class="sr-only">Our Location Map</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d155383.0031023755!2d13.259929226507422!3d52.50651325325883!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47a84e373f035901%3A0x42120465b5e3b70!2sBerlin!5e0!3m2!1sen!2sde!4v1709241600000!5m2!1sen!2sde" 
                width="100%" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
